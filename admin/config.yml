backend:
  name: git-gateway
  branch: main # Change this to 'master' if your GitHub repository uses master instead of main

media_folder: "images"
public_folder: "images"

collections:
  - name: "content"
    label: "Website Content"
    files:
      - name: "gallery"
        label: "My Photos"
        file: "gallery-data.json"
        fields:
          - label: "Gallery Slides"
            name: "slides"
            widget: "list"
            fields:
              - { label: "Photo", name: "image", widget: "image" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Caption Text", name: "caption", widget: "text" }